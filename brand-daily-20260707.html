<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>品牌动态日报 2026.07.07</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#F7F5F2;
  --card-bg:#FFFFFF;
  --text:#2C2C2C;
  --text-secondary:#6B6B6B;
  --accent:#1A1A1A;
  --border:#EBE8E3;
  --red:#D32F2F;
  --gold:#C78F00;
  --blue:#1A73E8;
  --gray:#999;
}
body{
  font-family:-apple-system,BlinkMacSystemFont,"PingFang SC","Microsoft YaHei","Hiragino Sans GB",sans-serif;
  background:var(--bg);
  color:var(--text);
  line-height:1.6;
  -webkit-font-smoothing:antialiased;
}
.container{
  max-width:720px;
  margin:0 auto;
  padding:40px 20px 60px;
}
.masthead{
  text-align:center;
  padding:20px 0 36px;
  border-bottom:1px solid var(--border);
  margin-bottom:32px;
}
.masthead .label{
  display:inline-block;
  font-size:11px;
  font-weight:600;
  letter-spacing:2px;
  text-transform:uppercase;
  color:var(--text-secondary);
  border:1px solid var(--border);
  padding:5px 16px;
  border-radius:2px;
  margin-bottom:14px;
}
.masthead h1{
  font-family:"Noto Serif SC","SimSun",serif;
  font-size:36px;
  font-weight:700;
  letter-spacing:1px;
  color:var(--accent);
  margin-bottom:6px;
}
.masthead .meta{
  font-size:13px;
  color:var(--text-secondary);
  font-weight:400;
}
.stats{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:12px;
  margin-bottom:32px;
}
.stat{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:8px;
  padding:20px 12px;
  text-align:center;
  transition:transform 0.15s ease,box-shadow 0.15s ease;
}
.stat:hover{
  transform:translateY(-2px);
  box-shadow:0 4px 16px rgba(0,0,0,0.06);
}
.stat .num{
  font-size:32px;
  font-weight:800;
  line-height:1;
  letter-spacing:-1px;
}
.stat .label{font-size:11px;color:var(--text-secondary);margin-top:6px;line-height:1.4}
.card{
  background:var(--card-bg);
  border:1px solid var(--border);
  border-radius:12px;
  overflow:hidden;
  margin-bottom:24px;
  transition:box-shadow 0.2s ease;
}
.card:hover{
  box-shadow:0 8px 32px rgba(0,0,0,0.08);
}
.card-hero{
  height:220px;
  background-size:cover;
  background-position:center;
  position:relative;
}
.card-hero.no-image{
  height:140px;
}
.hero-overlay{
  position:absolute;
  inset:0;
  background:linear-gradient(
    to top,
    rgba(0,0,0,0.8) 0%,
    rgba(0,0,0,0.3) 50%,
    rgba(0,0,0,0.05) 100%
  );
  display:flex;
  flex-direction:column;
  justify-content:flex-end;
  padding:24px;
}
.threat-badge{
  display:inline-block;
  color:#fff;
  font-size:10px;
  font-weight:700;
  padding:3px 10px;
  border-radius:2px;
  letter-spacing:0.5px;
  align-self:flex-start;
  margin-bottom:10px;
  text-transform:uppercase;
}
.brand-name{
  font-family:"Noto Serif SC","SimSun",serif;
  font-size:26px;
  font-weight:700;
  color:#fff;
  text-shadow:0 2px 8px rgba(0,0,0,0.4);
  letter-spacing:0.5px;
}
.brand-tags{
  display:flex;
  gap:6px;
  flex-wrap:wrap;
  margin-top:10px;
}
.mtag{
  font-size:10px;
  color:rgba(255,255,255,0.9);
  background:rgba(255,255,255,0.15);
  backdrop-filter:blur(8px);
  -webkit-backdrop-filter:blur(8px);
  padding:3px 8px;
  border-radius:3px;
  font-weight:500;
}
.card-body{
  padding:22px 24px;
}
.card-text{
  font-size:15px;
  color:var(--text);
  line-height:1.85;
  letter-spacing:0.01em;
}
.card-sources{
  display:flex;
  gap:8px;
  flex-wrap:wrap;
  margin-top:16px;
  padding-top:14px;
  border-top:1px solid var(--border);
}
.src-link{
  display:inline-flex;
  align-items:center;
  font-size:11px;
  color:var(--blue);
  background:#EEF4FF;
  padding:4px 12px;
  border-radius:4px;
  text-decoration:none;
  font-weight:500;
  transition:all 0.15s ease;
}
.src-link:hover{
  background:#D6E6FF;
  color:#0d5cb0;
}
.src-link::before{
  content:"";
  display:inline-block;
  width:5px;
  height:5px;
  background:currentColor;
  border-radius:50%;
  margin-right:6px;
  opacity:0.4;
}
.footer{
  text-align:center;
  padding:32px 0 0;
  border-top:1px solid var(--border);
  margin-top:16px;
}
.footer p{font-size:11px;color:#aaa;line-height:1.8}
@media(max-width:520px){
  .container{padding:24px 14px 48px}
  .masthead h1{font-size:28px}
  .stats{grid-template-columns:repeat(2,1fr);gap:8px}
  .card-hero{height:180px}
  .card-hero.no-image{height:120px}
  .hero-overlay{padding:18px}
  .brand-name{font-size:22px}
  .card-body{padding:18px}
  .card-text{font-size:14px}
}
</style>
</head>
<body>
<div class="container">
  <header class="masthead">
    <div class="label">Brand Intelligence</div>
    <h1>品牌动态日报</h1>
    <p class="meta">2026年07月07日 · T-3 窗口 · 收录 0 条动态</p>
  </header>
  <div class="stats">
    <div class="stat"><div class="num" style="color:var(--red)">0</div><div class="label">S 级<br>即时威胁</div></div>
    <div class="stat"><div class="num" style="color:#F57C00">0</div><div class="label">A 级<br>高度警戒</div></div>
    <div class="stat"><div class="num" style="color:var(--gold)">0</div><div class="label">B 级<br>重点关注</div></div>
    <div class="stat"><div class="num" style="color:var(--blue)">0</div><div class="label">C 级<br>持续追踪</div></div>
    <div class="stat"><div class="num" style="color:var(--gray)">1</div><div class="label">D 级<br>行业感知</div></div>
  </div>

    <article class="card" data-threat="D">
      <div class="card-hero no-image" style="background:linear-gradient(135deg, #95a5a6, #7b8a8b)">
        <div class="hero-overlay">
          <span class="threat-badge" style="background:#95a5a6">D 级</span>
          <div class="brand-name">行业动态</div>
          <div class="brand-tags">
            <span class="mtag">无新增</span>
          </div>
        </div>
      </div>
      <div class="card-body">
        <p class="card-text"><strong>本日无重大竞品动态</strong>，今日未监测到三品王主要竞品（蒙自源、阿香米线、和府捞面、遇见小面、赛百味、螺霸王等）的显著动态。市场相对平静，建议关注常规运营与用户反馈。</p>
        <div class="card-sources">
          <a class="src-link" href="https://riisekanon.github.io/brand-daily/" target="_blank">往期日报</a>
        </div>
      </div>
    </article><footer class="footer">
    <p>品牌动态日报 · 2026年07月07日</p>
    <p>三品王品牌情报系统 · 自动化生成</p>
  </footer>
</div>
</body>
</html>
